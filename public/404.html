<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TinyPal</title>
    <script>
      // GitHub Pages SPA redirect
      // Redirects sub-paths back to index.html with path encoded as query param
      var path = window.location.pathname.replace('/TinyPal', '') || '/';
      window.location.replace(
        window.location.origin + '/TinyPal/?p=' + encodeURIComponent(path)
      );
    </script>
  </head>
  <body></body>
</html>
